<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lọc · Kênh Tẻ</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }

  /* ── Camera background ── */
  #camera-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* ── A-Frame scene (transparent) ── */
  a-scene {
    position: fixed;
    inset: 0;
    z-index: 1;
  }
  .a-canvas { background: transparent !important; }

  /* ── Intro ── */
  #intro {
    position: fixed;
    inset: 0;
    background: #050508;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    pointer-events: all;
    gap: 1.2rem;
    text-align: center;
    padding: 2rem;
    transition: opacity 0.8s;
  }
  #intro h1 {
    font-size: 3.5rem;
    color: #fff;
    letter-spacing: 0.35em;
    font-weight: 400;
  }
  #intro .sub {
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    line-height: 2.4;
  }
  #intro .gps {
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.45);
  }
  #start-btn {
    margin-top: 0.6rem;
    padding: 0.9rem 2.5rem;
    border: 1px solid rgba(255,255,255,0.3);
    background: transparent;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.3s, box-shadow 0.3s;
    pointer-events: all;
  }
  #start-btn:hover {
    border-color: rgba(255,255,255,0.8);
    box-shadow: 0 0 24px rgba(255,255,255,0.08);
  }

  /* ── Poem overlay ── */
  #poem-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 5;
    opacity: 0;
    transition: opacity 1s;
    pointer-events: none;
  }
  #poem-overlay.active {
    opacity: 1;
    pointer-events: all;
  }
  #poem-canvas {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .poem-line {
    position: absolute;
    font-size: 1rem;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.88);
    text-shadow: 0 0 14px rgba(255,255,255,0.25);
    white-space: nowrap;
    opacity: 0;
    animation: drift linear forwards;
  }
  @keyframes drift {
    0%   { opacity: 0;   transform: translateX(0); }
    8%   { opacity: 1; }
    85%  { opacity: 0.9; }
    100% { opacity: 0;   transform: translateX(-120vw); }
  }

  /* ── GPS HUD ── */
  #top-hud {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 50;
    opacity: 0;
    transition: opacity 1.5s;
    white-space: nowrap;
    pointer-events: none;
  }
  #top-hud.show { opacity: 1; }
  #top-hud .title {
    font-size: 1.6rem;
    letter-spacing: 0.35em;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }
  #top-hud .gps {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.4);
  }

  /* ── Model UI (label + loading) ── */
  #model-ui {
    position: fixed;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  #model-label {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.58rem;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 1.5s;
  }
  #model-label.show { opacity: 1; }
  #loading-indicator {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.5rem;
    letter-spacing: 0.5em;
    color: rgba(255,255,255,0.2);
    opacity: 0;
    transition: opacity 0.5s;
    animation: pulse 2s ease-in-out infinite;
  }
  #loading-indicator.show { opacity: 1; }
  @keyframes pulse {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.5; }
  }

  /* ── Dot indicators ── */
  #dots {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.55rem;
    align-items: center;
    z-index: 50;
    opacity: 0;
    transition: opacity 1.2s;
    pointer-events: none;
  }
  #dots.show { opacity: 1; }
  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    transition: background 0.6s, transform 0.4s;
  }
  .dot.active {
    background: rgba(255,255,255,0.85);
    transform: scale(1.3);
  }

  /* ── Swipe hint ── */
  #swipe-hint {
    position: fixed;
    bottom: 3.8rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.42rem;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.15);
    text-transform: uppercase;
    z-index: 50;
    pointer-events: none;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 1.5s;
  }
  #swipe-hint.show { opacity: 1; }
</style>
</head>
<body>

<!-- Camera feed -->
<video id="camera-bg" autoplay playsinline muted></video>

<!-- Intro screen -->
<div id="intro">
  <h1>Lọc</h1>
  <div class="sub">
    Filter · Strain · Purify<br>
    Kênh Tẻ · Ho Chi Minh City
  </div>
  <div class="gps">10.7539° N &nbsp;·&nbsp; 106.6983° E</div>
  <button id="start-btn" onclick="startExperience()">Enter →</button>
</div>

<!-- GPS HUD -->
<div id="top-hud">
  <div class="title">Lọc</div>
  <div class="gps">10.7539° N &nbsp;·&nbsp; 106.6983° E &nbsp;·&nbsp; Kênh Tẻ</div>
</div>

<!-- Poem overlay — Screen 0 -->
<div id="poem-overlay">
  <div id="poem-canvas"></div>
</div>

<!-- Model UI -->
<div id="model-ui">
  <div id="loading-indicator">· · ·</div>
  <div id="model-label"></div>
</div>

<!-- Dot navigation -->
<div id="dots">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<!-- Swipe hint -->
<div id="swipe-hint">swipe to flow</div>

<!-- A-Frame scene — transparent, always mounted -->
<a-scene
  embedded
  renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

  <!-- Lighting -->
  <a-light type="ambient"     color="#ffffff" intensity="1.4"></a-light>
  <a-light type="directional" color="#ffffff" intensity="1.0" position="1 2 2"></a-light>
  <a-light type="directional" color="#aaccff" intensity="0.4" position="-1 0 1"></a-light>

  <!--
    Screen 1 — green-coconuts
    Movement: gentle bob (Y) + slow Y-axis rotation
    Feeling: heavy, patient, alive
  -->
  <a-entity id="coconuts-wrapper" visible="false"
    animation="property: position; from: 0 -0.25 -2; to: 0 -0.15 -2;
                dur: 4000; dir: alternate; loop: true; easing: easeInOutSine">
    <a-gltf-model id="model-coconuts"
      scale="0.2 0.2 0.2"
      animation="property: rotation; from: 0 0 0; to: 0 360 0;
                 dur: 24000; loop: true; easing: linear">
    </a-gltf-model>
  </a-entity>

  <!--
    Screen 2 — shells-along-canal
    Movement: drift left (X) + gentle rock (Z)
    Feeling: emptied, carried away, residue
  -->
  <a-entity id="shells-wrapper" visible="false"
    animation="property: position; from: 0.14 -0.2 -2; to: -0.14 -0.2 -2;
                dur: 10000; dir: alternate; loop: true; easing: easeInOutSine">
    <a-gltf-model id="model-shells"
      scale="0.2 0.2 0.2"
      animation="property: rotation; from: 0 0 -5; to: 0 0 5;
                 dur: 6000; dir: alternate; loop: true; easing: easeInOutSine">
    </a-gltf-model>
  </a-entity>

  <!--
    Screen 3 — trash-bag
    Movement: sway (X, outer) + rise/fall (Y, inner)
    Feeling: caught, suspended, trapped in the filter
  -->
  <a-entity id="trash-outer" visible="false"
    animation="property: position; from: -0.1 -0.25 -2; to: 0.1 -0.25 -2;
                dur: 3200; dir: alternate; loop: true; easing: easeInOutSine">
    <a-entity id="trash-inner"
      animation="property: position; from: 0 -0.06 0; to: 0 0.06 0;
                 dur: 5000; dir: alternate; loop: true; easing: easeInOutSine">
      <a-gltf-model id="model-trash" scale="0.2 0.2 0.2"></a-gltf-model>
    </a-entity>
  </a-entity>

</a-scene>

<script>
// ── Screen definitions ──────────────────────────────────────────────────────
const SCREENS = [
  {
    type: 'poem'
  },
  {
    type: 'model',
    wrapperId: 'coconuts-wrapper',
    modelId:   'model-coconuts',
    src:       './models/green-coconuts.glb',
    label:     'dừa · coconut'
  },
  {
    type: 'model',
    wrapperId: 'shells-wrapper',
    modelId:   'model-shells',
    src:       './models/shells-along-canal.glb',
    label:     'vỏ · shell'
  },
  {
    type: 'model',
    wrapperId: 'trash-outer',
    modelId:   'model-trash',
    src:       './models/trash-bag.glb',
    label:     'rác · trash'
  }
];

const POEM_LINES = [
  'mesh · lưới · trash · rác · sun',
  'haunted · inaccessible · no way in',
  'coconut · dừa · fabric · vải · lọc',
  'rác · residue · nắng · threshold · drift',
  'filter · lọc · strain · purify · water',
  'mesh · sun · nắng · coconut · fabric',
  'inaccessible · haunted · rác · lưới · vải',
  'residue · threshold · dừa · lọc · trash',
];

// ── State ───────────────────────────────────────────────────────────────────
let currentScreen   = 0;
let isTransitioning = false;
let loadedModels    = {};
let poemInterval    = null;
let lineIdx         = 0;
let touchStartX     = 0;
let mouseStartX     = 0;

// ── Entry ───────────────────────────────────────────────────────────────────
function startExperience() {
  const intro = document.getElementById('intro');
  intro.style.opacity = '0';
  setTimeout(() => intro.style.display = 'none', 800);

  startCamera();

  setTimeout(() => {
    document.getElementById('top-hud').classList.add('show');
    document.getElementById('dots').classList.add('show');
    document.getElementById('swipe-hint').classList.add('show');
    goToScreen(0);
    setupSwipe();
    preloadModel(1); // start fetching first model silently
  }, 400);
}

// ── Camera ──────────────────────────────────────────────────────────────────
function startCamera() {
  navigator.mediaDevices
    .getUserMedia({ video: { facingMode: 'environment' }, audio: false })
    .then(stream => { document.getElementById('camera-bg').srcObject = stream; })
    .catch(() => {
      // No camera — black background is fine for desktop/testing
      document.getElementById('camera-bg').style.display = 'none';
    });
}

// ── Navigation ───────────────────────────────────────────────────────────────
function goToScreen(index) {
  if (index < 0 || index >= SCREENS.length || isTransitioning) return;
  isTransitioning = true;
  currentScreen = index;

  updateDots();
  hideAllModels();

  const screen = SCREENS[index];

  if (screen.type === 'poem') {
    document.getElementById('poem-overlay').classList.add('active');
    hideModelUI();
    startPoem();
  } else {
    document.getElementById('poem-overlay').classList.remove('active');
    stopPoem();
    activateModelScreen(index);
  }

  setTimeout(() => { isTransitioning = false; }, 900);
}

function activateModelScreen(index) {
  const screen = SCREENS[index];
  const modelId = screen.modelId;

  if (loadedModels[modelId]) {
    revealModel(index);
  } else {
    showLoadingUI();
    preloadModel(index, () => {
      // Only reveal if we're still on this screen
      if (currentScreen === index) revealModel(index);
    });
  }

  // Silently preload the next model
  if (index + 1 < SCREENS.length) {
    setTimeout(() => preloadModel(index + 1), 2000);
  }
}

// ── Model loading ─────────────────────────────────────────────────────────────
function preloadModel(index, callback) {
  if (index <= 0 || index >= SCREENS.length) return;
  const screen = SCREENS[index];
  if (!screen.src || loadedModels[screen.modelId]) {
    if (callback) callback();
    return;
  }

  const el = document.getElementById(screen.modelId);
  el.setAttribute('src', screen.src);
  el.addEventListener('model-loaded', () => {
    loadedModels[screen.modelId] = true;
    if (callback) callback();
  }, { once: true });
}

function revealModel(index) {
  const screen = SCREENS[index];
  document.getElementById(screen.wrapperId).setAttribute('visible', 'true');
  document.getElementById('loading-indicator').classList.remove('show');
  const label = document.getElementById('model-label');
  label.classList.remove('show');
  label.textContent = screen.label;
  setTimeout(() => label.classList.add('show'), 400);
}

// ── UI helpers ───────────────────────────────────────────────────────────────
function hideAllModels() {
  SCREENS.forEach(s => {
    if (s.wrapperId) document.getElementById(s.wrapperId).setAttribute('visible', 'false');
  });
}

function hideModelUI() {
  document.getElementById('loading-indicator').classList.remove('show');
  const label = document.getElementById('model-label');
  label.classList.remove('show');
  label.textContent = '';
}

function showLoadingUI() {
  hideModelUI();
  document.getElementById('loading-indicator').classList.add('show');
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === currentScreen);
  });
}

// ── Poem ──────────────────────────────────────────────────────────────────────
function startPoem() {
  if (poemInterval) return;
  spawnPoemLine();
  poemInterval = setInterval(spawnPoemLine, 3500);
}

function stopPoem() {
  clearInterval(poemInterval);
  poemInterval = null;
  document.getElementById('poem-canvas').innerHTML = '';
}

function spawnPoemLine() {
  const canvas = document.getElementById('poem-canvas');
  const line   = document.createElement('div');
  line.className   = 'poem-line';
  line.textContent = POEM_LINES[lineIdx % POEM_LINES.length];
  lineIdx++;

  line.style.top   = (18 + Math.random() * 58) + '%';
  line.style.right = '-10px';
  line.style.left  = 'auto';

  const dur = 14 + Math.random() * 8;
  line.style.animationDuration = dur + 's';
  line.style.color    = `rgba(255,255,255,${(0.7 + Math.random() * 0.3).toFixed(2)})`;
  line.style.fontSize = (0.85 + Math.random() * 0.35).toFixed(2) + 'rem';

  canvas.appendChild(line);
  setTimeout(() => { if (line.parentNode) line.parentNode.removeChild(line); }, dur * 1000 + 500);
}

// ── Swipe ────────────────────────────────────────────────────────────────────
function setupSwipe() {
  // Touch
  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 45) {
      document.getElementById('swipe-hint').classList.remove('show');
      goToScreen(currentScreen + (dx < 0 ? 1 : -1));
    }
  }, { passive: true });

  // Mouse (desktop testing)
  document.addEventListener('mousedown', e => { mouseStartX = e.clientX; });
  document.addEventListener('mouseup', e => {
    const dx = e.clientX - mouseStartX;
    if (Math.abs(dx) > 45) {
      goToScreen(currentScreen + (dx < 0 ? 1 : -1));
    }
  });
}
</script>
</body>
</html>
