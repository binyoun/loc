<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lọc · Filter · Kênh Tẻ</title>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }

  #ui-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
  }

  /* GPS + title */
  #top-hud {
    position: absolute;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s;
    white-space: nowrap;
  }
  #top-hud.show { opacity: 1; }
  #top-hud .title {
    font-size: 2rem;
    letter-spacing: 0.3em;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  #top-hud .gps {
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.7);
  }

  /* Poem canvas — floating words */
  #poem-canvas {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .poem-line {
    position: absolute;
    font-size: 1rem;
    letter-spacing: 0.18em;
    color: rgba(255, 255, 255, 0.88);
    text-shadow: 0 0 12px rgba(255,255,255,0.3);
    white-space: nowrap;
    opacity: 0;
    animation: drift linear forwards;
  }

  @keyframes drift {
    0%   { opacity: 0;    transform: translateX(0); }
    8%   { opacity: 1; }
    85%  { opacity: 0.9; }
    100% { opacity: 0;    transform: translateX(-120vw); }
  }

  /* Scan prompt */
  #scan-prompt {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
    text-align: center;
    text-transform: uppercase;
    transition: opacity 1s;
  }
  #scan-prompt.hide { opacity: 0; }

  /* Intro screen */
  #intro {
    position: fixed;
    inset: 0;
    background: #050508;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 2rem;
    text-align: center;
    gap: 1.2rem;
  }
  #intro h1 {
    font-size: 3.5rem;
    color: #fff;
    letter-spacing: 0.35em;
    font-weight: 400;
  }
  #intro .sub {
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    line-height: 2.2;
  }
  #intro .gps-intro {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.5);
  }
  #start-btn {
    margin-top: 0.5rem;
    padding: 0.9rem 2.5rem;
    border: 1px solid rgba(255,255,255,0.3);
    background: transparent;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.3s, box-shadow 0.3s;
    pointer-events: all;
  }
  #start-btn:hover {
    border-color: #fff;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
  }
  #intro .instruction {
    font-size: 0.58rem;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.1em;
    line-height: 2;
  }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <h1>Lọc</h1>
  <div class="sub">Filter · Strain · Purify<br>Kênh Tẻ · Ho Chi Minh City</div>
  <div class="gps-intro">10.7539° N · 106.6983° E</div>
  <button id="start-btn" onclick="startAR()">Point at the print →</button>
  <div class="instruction">
    Point your camera at the cyanotype print<br>
    to activate the canal layer
  </div>
</div>

<!-- UI OVERLAY -->
<div id="ui-overlay">
  <div id="top-hud">
    <div class="title">Lọc</div>
    <div class="gps">10.7539° N · 106.6983° E · Kênh Tẻ</div>
  </div>
  <div id="poem-canvas"></div>
  <div id="scan-prompt">Point camera at the cyanotype print</div>
</div>

<!-- AR SCENE -->
<a-scene
  id="ar-scene"
  mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  style="display:none;">

  <a-assets>
    <img id="img-fence"   src="./images/IMG_0951.jpg" crossorigin="anonymous">
    <img id="img-trash"   src="./images/IMG_0937.jpg" crossorigin="anonymous">
    <img id="img-fabric"  src="./images/IMG_0981.jpg" crossorigin="anonymous">
    <img id="img-flowers" src="./images/IMG_1012.jpg" crossorigin="anonymous">
    <img id="img-coconut" src="./images/IMG_0971.jpg" crossorigin="anonymous">
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane id="ar-plane"
      src="#img-fence"
      position="0 0 0.01"
      width="1" height="2.5"
      material="opacity: 0; transparent: true; shader: flat">
    </a-plane>
  </a-entity>

</a-scene>

<script>
// Word pools — bilingual clusters of 5-6 words
const POEM_LINES = [
  'mesh · lưới · trash · rác · sun',
  'haunted · inaccessible · no way in',
  'coconut · dừa · fabric · vải · lọc',
  'rác · residue · nắng · threshold · drift',
  'filter · lọc · strain · purify · water',
  'mesh · sun · nắng · coconut · fabric',
  'inaccessible · haunted · rác · lưới · vải',
  'residue · threshold · dừa · lọc · trash',
];

const IMAGES = ['#img-fence', '#img-trash', '#img-fabric', '#img-flowers', '#img-coconut'];

let imageInterval, poemInterval;
let currentImage = 0;
let targetFound = false;
let poemActive = false;

function startAR() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('ar-scene').style.display = 'block';

  const scene = document.getElementById('ar-scene');
  scene.addEventListener('loaded', () => {
    scene.systems['mindar-image-system'].start();
  });

  setupTargetEvents();
}

function setupTargetEvents() {
  const scene = document.getElementById('ar-scene');

  scene.addEventListener('targetFound', () => {
    targetFound = true;
    document.getElementById('scan-prompt').classList.add('hide');
    document.getElementById('top-hud').classList.add('show');

    // Fade in first image
    const plane = document.getElementById('ar-plane');
    fadeEntity(plane, 0, 0.88, 1200);

    // Image sequence
    currentImage = 0;
    imageInterval = setInterval(() => {
      currentImage = (currentImage + 1) % IMAGES.length;
      const plane = document.getElementById('ar-plane');
      fadeEntity(plane, 0.88, 0, 500);
      setTimeout(() => {
        plane.setAttribute('src', IMAGES[currentImage]);
        fadeEntity(plane, 0, 0.88, 800);
      }, 600);
    }, 5000);

    // Poem lines — drift sideways
    if (!poemActive) {
      poemActive = true;
      spawnPoemLine();
      poemInterval = setInterval(spawnPoemLine, 3500);
    }
  });

  scene.addEventListener('targetLost', () => {
    targetFound = false;
    document.getElementById('scan-prompt').classList.remove('hide');
    document.getElementById('top-hud').classList.remove('show');
    clearInterval(imageInterval);
    clearInterval(poemInterval);
    poemActive = false;
    document.getElementById('poem-canvas').innerHTML = '';
    const plane = document.getElementById('ar-plane');
    fadeEntity(plane, 0.88, 0, 600);
  });
}

let lineIndex = 0;
function spawnPoemLine() {
  const canvas = document.getElementById('poem-canvas');
  const line = document.createElement('div');
  line.className = 'poem-line';

  // Pick line from pool, rotate through
  line.textContent = POEM_LINES[lineIndex % POEM_LINES.length];
  lineIndex++;

  // Random vertical position — avoid top HUD and bottom prompt
  const topPct = 18 + Math.random() * 58;
  line.style.top = topPct + '%';

  // Start from right edge, drift left
  line.style.right = '-10px';
  line.style.left = 'auto';

  // Random speed 14–22s
  const duration = 14 + Math.random() * 8;
  line.style.animationDuration = duration + 's';

  // Slight opacity variation
  const opacity = 0.7 + Math.random() * 0.3;
  line.style.color = `rgba(255,255,255,${opacity})`;

  // Slight size variation
  const size = 0.85 + Math.random() * 0.35;
  line.style.fontSize = size + 'rem';

  canvas.appendChild(line);

  // Remove after animation
  setTimeout(() => {
    if (line.parentNode) line.parentNode.removeChild(line);
  }, duration * 1000 + 500);
}

function fadeEntity(el, from, to, duration) {
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    el.setAttribute('material', 'opacity', from + (to - from) * t);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
</script>

</body>
</html>
